<!DOCTYPE html>
<html lang="ja">
<head>

    <title>Protected Content</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #password-gate { text-align: center; padding: 40px; border-radius: 12px; background: #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 25px; font-size: 20px; }
        #pass-input { padding: 12px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; width: 220px; font-size: 16px; outline: none; margin-bottom: 15px; }
        #unlock-btn { padding: 12px 30px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: background 0.3s; }
        #unlock-btn:hover { background: #357abd; }
        #error-msg { color: #ff6b6b; display: none; margin-top: 20px; font-size: 14px; }
        #secret-content { display: none; width: 100%; max-width: 900px; padding: 20px; box-sizing: border-box; }
        .embed-container { margin-top: 30px; border: 1px solid #333; background: #000; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

    <h2>パスワードを入力してください</h2>

    function check() {
        const p = document.getElementById('pass-input').value;
        const e = document.getElementById('error-msg');
        const s = document.getElementById('secret-content');
        const g = document.getElementById('password-gate');

        try {
            const b = CryptoJS.AES.decrypt(data, p);
            const d = b.toString(CryptoJS.enc.Utf8);

            if (d.length > 0) {
                g.style.display = 'none';
                document.body.style.display = 'block';
                s.style.display = 'block';
                s.innerHTML = d;

                const sc = s.getElementsByTagName("script");
                for (let i = 0; i < sc.length; i++) {
                    const n = document.createElement("script");
                    if (sc[i].src) { n.src = sc[i].src; }
                    else { n.text = sc[i].text; }
                    document.head.appendChild(n).parentNode.removeChild(n);
                }
            } else {
                throw new Error();
            }
        } catch (err) {
            e.style.display = 'block';
        }
    }

    document.getElementById('pass-input').addEventListener('keypress', function (event) {
        if (event.key === 'Enter') { check(); }
    });
