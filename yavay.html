<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Parallel URL Hunter - Adaptive Engine Pro</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --border: #333;
            --win: #00a4ef;
            --cn: #eccc68;  
            --top: #70a1ff; 
            --icu: #2ed573; 
            --custom: #ff4757; /* Custom Domain Color */
        }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .control-group { display: flex; flex-direction: column; gap: 4px; border-left: 1px solid #444; padding-left: 15px; }
        .control-group:first-child { border: none; padding: 0; }
        
        button { padding: 8px 20px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        #start-btn { background: #2ed573; color: #000; }
        #stop-btn { background: #ff4757; color: #fff; display: none; }
        
        input[type="text"] { background: #000; border: 1px solid var(--border); color: var(--custom); padding: 4px 8px; border-radius: 4px; width: 80px; }
        input[type="range"] { vertical-align: middle; }
        label { font-size: 0.75rem; color: #888; }

        main { display: flex; flex: 1; overflow: hidden; }
        .log-panel { width: 280px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        #log-area { flex: 1; font-size: 10px; color: #666; padding: 10px; overflow-y: hidden; white-space: pre-wrap; line-height: 1.2; }

        .results-container { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); }
        .domain-col { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
        .col-header { padding: 12px; text-align: center; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.05); }
        .links-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; }

        .col-win { color: var(--win); } .col-cn { color: var(--cn); } .col-top { color: var(--top); } .col-icu { color: var(--icu); } .col-custom { color: var(--custom); }
        
        .link-card { background: var(--panel); padding: 6px; margin-bottom: 6px; border-radius: 4px; border-left: 3px solid currentColor; animation: slideIn 0.3s ease-out; }
        .link-card a { color: #fff; text-decoration: none; word-break: break-all; }
        
        .stats-val { color: #fff; font-weight: bold; }

        @keyframes slideIn { from { transform: translateX(10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="control-group">
        <button id="start-btn" onclick="toggleScan(true)">IGNITION</button>
        <button id="stop-btn" onclick="toggleScan(false)">EMERGENCY STOP</button>
    </div>

    <div class="control-group">
        <label>Length: <span id="len-val" class="stats-val">3-6</span></label>
        <input type="range" id="min-len" min="1" max="10" value="3" oninput="updateLenLabel()">
        <input type="range" id="max-len" min="1" max="15" value="6" oninput="updateLenLabel()">
    </div>

    <div class="control-group">
        <label>Custom TLD</label>
        <div>.<input type="text" id="custom-tld" value="com" placeholder="com"></div>
    </div>

    <div class="control-group">
        <div>Threads: <span id="thread-val" class="stats-val">0</span></div>
        <div style="font-size: 0.8rem; color: #888;">Load: <span id="load-val">0</span>%</div>
    </div>

    <div class="control-group">
        <div id="global-stats">Scanned: <span id="scanned-val" class="stats-val">0</span></div>
        <div id="found-stats">Live: <span id="found-val" class="stats-val" style="color:#2ed573">0</span></div>
    </div>
</header>

<main>
    <div class="log-panel">
        <div style="padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.8rem;">NETWORK TRAFFIC</div>
        <div id="log-area"></div>
    </div>

    <div class="results-container">
        <div class="domain-col col-win"><div class="col-header">.win</div><div id="list-win" class="links-list"></div></div>
        <div class="domain-col col-cn"><div class="col-header">.cn</div><div id="list-cn" class="links-list"></div></div>
        <div class="domain-col col-top"><div class="col-header">.top</div><div id="list-top" class="links-list"></div></div>
        <div class="domain-col col-icu"><div class="col-header">.icu</div><div id="list-icu" class="links-list"></div></div>
        <div class="domain-col col-custom"><div class="col-header" id="header-custom">.com</div><div id="list-custom" class="links-list"></div></div>
    </div>
</main>

<script>
    let DOMAINS = ['win', 'cn', 'top', 'icu', 'custom'];
    const CHARS = 'abcdefghijklmnopqrstuvwxyz0123456789';
    let isRunning = false;
    let totalScanned = 0;
    let totalFound = 0;
    
    let currentThreads = 5;
    const MAX_THREADS = 100;
    const MIN_THREADS = 1;
    let lastFrameTime = performance.now();
    let fps = 60;

    function updateLenLabel() {
        const min = document.getElementById('min-len').value;
        const max = document.getElementById('max-len').value;
        document.getElementById('len-val').innerText = `${min}-${max}`;
    }

    function monitorLoad() {
        const now = performance.now();
        const delta = now - lastFrameTime;
        fps = 1000 / delta;
        lastFrameTime = now;

        if (isRunning) {
            if (fps < 45 && currentThreads > MIN_THREADS) {
                currentThreads--;
            } else if (fps > 55 && currentThreads < MAX_THREADS) {
                currentThreads++;
                worker();
            }
            document.getElementById('thread-val').innerText = currentThreads;
            document.getElementById('load-val').innerText = Math.round(Math.max(0, 100 - (fps / 60 * 100)));
        }
        requestAnimationFrame(monitorLoad);
    }
    requestAnimationFrame(monitorLoad);

    function generateURL() {
        const min = parseInt(document.getElementById('min-len').value);
        const max = parseInt(document.getElementById('max-len').value);
        const len = Math.floor(Math.random() * (max - min + 1)) + min;
        
        let str = '';
        for (let i = 0; i < len; i++) str += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
        
        const domainKey = DOMAINS[Math.floor(Math.random() * DOMAINS.length)];
        let actualDomain = domainKey;
        
        if (domainKey === 'custom') {
            actualDomain = document.getElementById('custom-tld').value || 'com';
        }

        return { url: `${str}.${actualDomain}`, domainKey: domainKey, actualDomain: actualDomain };
    }

    async function checkUrl(urlObj) {
        return new Promise((resolve) => {
            const img = new Image();
            const timer = setTimeout(() => {
                img.src = ""; 
                resolve(false);
            }, 2500);

            img.onload = () => { clearTimeout(timer); resolve(true); };
            img.onerror = () => { clearTimeout(timer); resolve(false); };
            img.src = `http://${urlObj.url}/favicon.ico?nocache=${Date.now()}`;
        });
    }

    async function worker() {
        while (isRunning) {
            const activeThreads = parseInt(document.getElementById('thread-val').innerText);
            if (currentThreads < activeThreads) break;

            const item = generateURL();
            totalScanned++;
            
            updateStats();
            const log = document.getElementById('log-area');
            log.prepend(`[REQ] ${item.url}\n`);
            if (log.innerText.length > 2000) log.innerText = log.innerText.substring(0, 2000);

            const alive = await checkUrl(item);
            if (alive) {
                addLinkToColumn(item);
            }
            await new Promise(r => setTimeout(r, 10));
        }
    }

    function addLinkToColumn(item) {
        totalFound++;
        updateStats();
        // customの場合は list-custom に入れる
        const listId = item.domainKey === 'custom' ? 'list-custom' : `list-${item.domainKey}`;
        const list = document.getElementById(listId);
        
        const div = document.createElement('div');
        div.className = 'link-card';
        div.style.color = `var(--${item.domainKey})`;
        div.innerHTML = `<a href="http://${item.url}" target="_blank">${item.url}</a>`;
        list.prepend(div);
    }

    function updateStats() {
        document.getElementById('scanned-val').innerText = totalScanned;
        document.getElementById('found-val').innerText = totalFound;
    }

    function toggleScan(start) {
        isRunning = start;
        document.getElementById('start-btn').style.display = start ? 'none' : 'inline-block';
        document.getElementById('stop-btn').style.display = start ? 'inline-block' : 'none';

        if (start) {
            // カスタムドメインの表示を更新
            const customVal = document.getElementById('custom-tld').value || 'com';
            document.getElementById('header-custom').innerText = `.${customVal}`;
            
            totalScanned = 0;
            totalFound = 0;
            currentThreads = 10;
            for (let i = 0; i < currentThreads; i++) {
                worker();
            }
        }
    }
</script>
</body>
</html>
